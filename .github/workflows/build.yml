name: Build Shree Maruti EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # Stable version

      - name: Set up Python
        uses: actions/setup-python@v5  # Stable version
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter Pillow pyinstaller

      - name: Check Required Files
        run: |
          if (-not (Test-Path "shree_maruti_calc.py")) {
            Write-Error "FATAL: shree_maruti_calc.py not found! Please push the python code to the repo."
            exit 1
          }
          if (-not (Test-Path "maruti_logo.png")) {
            Write-Error "FATAL: maruti_logo.png not found! The logo is required for the build."
            exit 1
          }
          echo "All files found. Proceeding..."

      - name: Generate Icon (icon.ico)
        run: |
          python -c "
          from PIL import Image
          import os
          try:
              icon_name = 'icon.ico'
              if os.path.exists('icon_source.png'):
                  img = Image.open('icon_source.png')
                  img.save(icon_name)
                  print('Created icon from icon_source.png')
              elif os.path.exists('maruti_logo.png'):
                  img = Image.open('maruti_logo.png')
                  w, h = img.size
                  side = min(w, h)
                  left = (w - side) // 2
                  top = (h - side) // 2
                  crop = img.crop((left, top, left + side, top + side))
                  crop = crop.resize((256, 256), Image.Resampling.LANCZOS)
                  crop.save(icon_name)
                  print('Created icon by cropping maruti_logo.png')
          except Exception as e:
              print(f'Error creating icon: {e}')
          "

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon="icon.ico" --add-data "maruti_logo.png;." --add-data "icon.ico;." --name "Shree_Maruti_Calculator" shree_maruti_calc.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shree_Maruti_Calculator
          path: dist/Shree_Maruti_Calculator.exe
